---
name: Publish Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/**
      - build/mkdocs/**
  release:
    types: [published]

permissions:
  contents: read # Set default read-only permissions

jobs:
  build-docs:
    name: Publish Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version-file: go.mod

      - name: Make Script Executable
        run: chmod +x ./scripts/build-tplprev.sh

      - name: Build tplprev
        run: |
          go mod download
          go clean -cache  # Clear build cache
          ./scripts/build-tplprev.sh

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
          cache: "pip"
          cache-dependency-path: |
            build/mkdocs/docs-requirements.txt

      - name: Setup Cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          key: mkdocs-material-${{ hashFiles('build/mkdocs/docs-requirements.txt') }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install mkdocs
        run: |
          pip install -r build/mkdocs/docs-requirements.txt

      - name: Determine Mike Version and Aliases
        id: mike
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${TAG_NAME}" >> "$GITHUB_OUTPUT"
            echo "aliases=latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Deploy
        env:
          ALIASES: ${{ steps.mike.outputs.aliases }}
          VERSION: ${{ steps.mike.outputs.version }}
        run: |
          if [ -n "${ALIASES}" ]; then
            mike deploy \
              --config-file build/mkdocs/mkdocs.yaml \
              --push \
              --update-aliases "${VERSION}" "${ALIASES}"
          else
            mike deploy \
              --config-file build/mkdocs/mkdocs.yaml \
              --push \
              "${VERSION}"
          fi
